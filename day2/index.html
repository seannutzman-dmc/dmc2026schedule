<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="refresh" content="1800">
  <title>District Music Contest — Day 2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
     --bg: #f7f3e9;            /* warm parchment */
    --panel: rgba(0,0,0,.04);
    --panel-strong: rgba(0,0,0,.08);
    --text: #1f2933;          /* deep charcoal */
    --muted: #5f6b73;
    --accent: #4dd9ac;
    --line: rgba(0,0,0,.10);

    /* Room colors (slightly deeper for light background) */
    --room1: #2fbf9f;   /* teal */
    --room2: #e85d5d;   /* coral */
    --room3: #8b6cf6;   /* violet */
    --room4: #3ba3e6;

  --header-h: 160px;
  --radius: 18px;

  --title-size: clamp(38px, 3.0vw, 64px);
  --subhead-size: clamp(22px, 1.6vw, 34px);
  --section-title: clamp(28px, 2.1vw, 44px);
  --cell-size: clamp(18px, 1.2vw, 28px);

  --pad: clamp(16px, 1.2vw, 28px);
  --row-pad-y: clamp(10px, 0.9vw, 18px);
  --row-pad-x: clamp(10px, 1.0vw, 18px);

  --px-per-sec: 40;
}

      --header-h: 160px;
      --radius: 18px;

      --title-size: clamp(38px, 3.0vw, 64px);
      --subhead-size: clamp(22px, 1.6vw, 34px);
      --section-title: clamp(28px, 2.1vw, 44px);
      --cell-size: clamp(18px, 1.2vw, 28px);

      --pad: clamp(16px, 1.2vw, 28px);
      --row-pad-y: clamp(10px, 0.9vw, 18px);
      --row-pad-x: clamp(10px, 1.0vw, 18px);

      --px-per-sec: 40;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1000px 600px at 10% 0%, rgba(77,217,172,.10), transparent 60%),
        radial-gradient(800px 500px at 100% 10%, rgba(255,107,107,.10), transparent 60%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app{
      height: 100%;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
    }

    header{
      padding: var(--pad);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(to bottom, rgba(0,0,0,.25), rgba(0,0,0,.00));
    }

    .titles{
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 0;
      text-align: center;
      grid-column: 2;
    }

    .title{
      font-weight: 800;
      letter-spacing: .5px;
      font-size: var(--title-size);
      line-height: 1.05;
      color: #2f097d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle{
      font-weight: 700;
      font-size: var(--subhead-size);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .meta{
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      text-align: right;
      color: var(--muted);
      grid-column: 3;
    }

    .meta .updated{
      font-size: 16px;
      color: var(--muted);
      font-weight: 600;
    }

    .meta .hint{
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .viewport{
      position: relative;
      height: 100%;
      overflow: hidden;
      padding: var(--pad);
    }

    .panel{
      height: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      overflow: hidden;
      position: relative;
    }

    .scroll-track{
      will-change: transform;
    }

    .is-scrolling .scroll-track{
      animation-name: marqueeY;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-duration: var(--scroll-duration, 60s);
    }

    @keyframes marqueeY{
      from { transform: translateY(0); }
      to   { transform: translateY(calc(-1 * var(--scroll-distance, 1000px))); }
    }

    .content{
      padding: var(--pad);
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .section{
      border-radius: calc(var(--radius) - 6px);
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
      border-left: 10px solid var(--accent);
    }

    /* Room color left borders */
    .section:nth-of-type(1) { border-left-color: var(--room1); }
    .section:nth-of-type(2) { border-left-color: var(--room2); }
    .section:nth-of-type(3) { border-left-color: var(--room3); }
    .section:nth-of-type(4) { border-left-color: var(--room4); }

    .section-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    /* Room color header gradients */
    .section:nth-of-type(1) .section-header {
      background: linear-gradient(to right, rgba(77,217,172,.25), transparent 75%);
    }
    .section:nth-of-type(2) .section-header {
      background: linear-gradient(to right, rgba(255,107,107,.25), transparent 75%);
    }
    .section:nth-of-type(3) .section-header {
      background: linear-gradient(to right, rgba(167,139,250,.25), transparent 75%);
    }
    .section:nth-of-type(4) .section-header {
      background: linear-gradient(to right, rgba(56,189,248,.25), transparent 75%);
    }

    .section-title{
      font-size: var(--section-title);
      font-weight: 800;
      letter-spacing: .3px;
      margin: 0;
      line-height: 1.1;
    }

    .section-note{
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    table{
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th{
      font-size: calc(var(--cell-size) * 0.95);
      text-transform: uppercase;
      letter-spacing: .08em;
       color: #1f2933;
      background: rgba(0,0,0,.08);
      font-weight: 800;
      padding: 14px var(--row-pad-x);
      border-bottom: 1px solid var(--line);
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody td{
      font-size: var(--cell-size);
      font-weight: 700;
      padding: var(--row-pad-y) var(--row-pad-x);
      border-bottom: 1px solid rgba(255,255,255,.08);
      vertical-align: top;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:nth-child(2n){
      background: rgba(0,0,0,.03);
    }

    td.wrap{
      white-space: normal;
      line-height: 1.15;
    }

    /* Now Performing */
    .now-performing {
      background: linear-gradient(90deg, rgba(255,200,80,.35), rgba(0,0,0,.03)) !important;
      box-shadow: inset 8px 0 0 #f59e0b;
    }

    .now-performing td {
      color: #000;
      font-weight: 800;
    }

    .now-performing td:nth-child(5)::before {
      content: "NOW";
      display: block;
      margin: 0 auto 4px auto;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ffd166;
      color: #1a1a1a;
      font-size: 0.72em;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .error{
      padding: 22px;
      color: rgba(255,220,220,.92);
      font-weight: 700;
    }

    .loading{
      padding: 22px;
      color: rgba(255,255,255,.78);
      font-weight: 700;
    }

    @media (prefers-reduced-motion: reduce){
      .is-scrolling .scroll-track{ animation: none !important; }
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="titles">
        <div class="title">District Music Contest</div>
        <div class="subtitle">
          <span>Friday, April 24</span>
        </div>
      </div>
      <div class="meta">
        <div class="updated" id="updated">Updating…</div>
        <div class="hint">Continuous scroll • Auto-refresh data</div>
      </div>
    </header>

    <main class="viewport">
      <div class="panel" id="panel">
        <div class="scroll-track" id="track">
          <div class="content" id="content">
            <div class="loading">Loading schedules…</div>
          </div>
        </div>
      </div>
    </main>
  </div>

<script>
  // ====== CONFIG ======
  const SOURCES = [
    {
      name: "Auditorium Schedule",
      url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkDtGZuMaxz20NEAyvIiMZKBlPCLTQfCGX41BNpz3bvy2oEl_yw8KkHCpM5SLl6E2m3slUxuPEXd-S/pub?gid=87659965&single=true&output=csv"
    },
    {
      name: "Music Room Schedule",
      url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkDtGZuMaxz20NEAyvIiMZKBlPCLTQfCGX41BNpz3bvy2oEl_yw8KkHCpM5SLl6E2m3slUxuPEXd-S/pub?gid=1826273686&single=true&output=csv"
    },
    {
      name: "Room 1 Schedule",
      url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkDtGZuMaxz20NEAyvIiMZKBlPCLTQfCGX41BNpz3bvy2oEl_yw8KkHCpM5SLl6E2m3slUxuPEXd-S/pub?gid=807671309&single=true&output=csv"
    }
  ];

  const COL_START = 1;
  const COL_END_EXCLUSIVE = 7;
  const IGNORE_TOP_ROWS = 2;
  const DATA_REFRESH_MS = 5 * 60 * 1000;

  // ====== HELPERS ======
  const $ = (id) => document.getElementById(id);

  function nowStamp(){
    const d = new Date();
    return d.toLocaleString(undefined, {
      weekday: "short", month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  }

  function cacheBusted(url){
    const u = new URL(url);
    u.searchParams.set("_ts", Date.now().toString());
    return u.toString();
  }

  function isRowEmpty(cells){
    return cells.every(v => (v ?? "").toString().trim() === "");
  }

  function sliceBG(row){
    return row
      .slice(COL_START, COL_END_EXCLUSIVE)
      .map(v => (v ?? "").toString().trim());
  }

  // ====== NOW PERFORMING ======
  function parseTimeToMinutes(value){
    if (!value) return null;
    const text = value.toString().trim();
    const match = text.match(/(\d{1,2}):(\d{2})\s*([AaPp][Mm])?/);
    if (!match) return null;
    let hours = parseInt(match[1], 10);
    const minutes = parseInt(match[2], 10);
    const meridiem = match[3] ? match[3].toUpperCase() : null;
    if (meridiem) {
      if (meridiem === "PM" && hours !== 12) hours += 12;
      if (meridiem === "AM" && hours === 12) hours = 0;
    }
    return hours * 60 + minutes;
  }

  function passesDayConstraint(){
    // return true;  ← TEST MODE (disabled)

    const now = new Date();
    const targetMonth = 4;  // April
    const targetDay = 24;   // Friday page

    return (now.getMonth() + 1 === targetMonth) && (now.getDate() === targetDay);
  }

  function highlightNowPerforming(){
    const sections = document.querySelectorAll(".section");
    const now = new Date();
    const nowMinutes = now.getHours() * 60 + now.getMinutes();

    sections.forEach(section => {
      section.classList.remove("section-live");
      const rows = Array.from(section.querySelectorAll("tbody tr"));
      rows.forEach(r => r.classList.remove("now-performing"));

      if (!passesDayConstraint()) return;
      if (!rows.length) return;

      const rowTimes = rows.map(r => parseTimeToMinutes(r.dataset.time));
      let liveIndex = -1;

      for (let i = 0; i < rows.length; i++) {
        const currentTime = rowTimes[i];
        const nextTime = rowTimes[i + 1];
        if (currentTime == null) continue;

        if (i === rows.length - 1) {
          if (nowMinutes >= currentTime) liveIndex = i;
        } else if (nextTime != null) {
          if (nowMinutes >= currentTime && nowMinutes < nextTime) {
            liveIndex = i;
            break;
          }
        } else {
          if (nowMinutes >= currentTime) liveIndex = i;
        }
      }

      if (liveIndex >= 0) {
        rows[liveIndex].classList.add("now-performing");
        section.classList.add("section-live");
      }
    });
  }

  // ====== BUILD TABLE ======
  function buildSection(name, rowsBG){
    const section = document.createElement("section");
    section.className = "section";

    const header = document.createElement("div");
    header.className = "section-header";

    const h2 = document.createElement("h2");
    h2.className = "section-title";
    h2.textContent = name;

    const note = document.createElement("div");
    note.className = "section-note";
    note.textContent = "Live from Google Sheets";

    header.appendChild(h2);
    header.appendChild(note);
    section.appendChild(header);

    const table = document.createElement("table");

    // Column width control
    const colgroup = document.createElement("colgroup");
    const colWidths = ["15%", "15%", "25%", "20%", "15%", "10%"];
    colWidths.forEach(w => {
    const col = document.createElement("col");
    col.style.width = w;
    colgroup.appendChild(col);
    });
    table.appendChild(colgroup);

    const thead = document.createElement("thead");
    const tbody = document.createElement("tbody");

    let headerRow = rowsBG[0] || [];
    let bodyRows = rowsBG.slice(1);

    if (!headerRow.length) {
      headerRow = ["Time", "School", "Student/s", "Event", "Rating", "OPA/HM"].slice(0, 6);
      bodyRows = [];
    }

    const trh = document.createElement("tr");
    headerRow.forEach((cell) => {
      const th = document.createElement("th");
      th.textContent = cell || "";
      trh.appendChild(th);
    });
    thead.appendChild(trh);

    bodyRows.forEach((r) => {
      if (isRowEmpty(r)) return;
      const tr = document.createElement("tr");

      // Store TIME column for "Now Performing" logic
      tr.dataset.time = (r[0] || "").trim();

      r.forEach((cell, idx) => {
        const td = document.createElement("td");
        td.textContent = cell || "";

        // idx 0 = Time, idx 4 = Rating, idx 5 = OPA
        if (idx === 0 || idx === 4 || idx === 5) {
          td.style.textAlign = "center";
          td.style.verticalAlign = "middle";
        } else {
          td.style.textAlign = "left";
          td.style.verticalAlign = "middle";
        }

        // Middle columns wrap (School and Student/s)
        if (idx === 1 || idx === 2) td.classList.add("wrap");

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(thead);
    table.appendChild(tbody);
    section.appendChild(table);

    return section;
  }

  // ====== FETCH ======
  async function fetchCsvRows(url){
    return new Promise((resolve, reject) => {
      Papa.parse(cacheBusted(url), {
        download: true,
        skipEmptyLines: true,
        complete: (res) => resolve(res.data || []),
        error: (err) => reject(err)
      });
    });
  }

  // ====== SCROLL ======
  function clearAndStopScrolling(){
    $("panel").classList.remove("is-scrolling");
    $("track").style.removeProperty("--scroll-distance");
    $("track").style.removeProperty("--scroll-duration");
  }

  function startContinuousScroll(){
    const panel = $("panel");
    const track = $("track");
    const content = $("content");

    const existingClone = document.getElementById("content-clone");
    if (existingClone) existingClone.remove();

    const panelHeight = panel.clientHeight;
    const contentHeight = content.scrollHeight;

    if (contentHeight <= panelHeight - 10) {
      clearAndStopScrolling();
      return;
    }

    const clone = content.cloneNode(true);
    clone.id = "content-clone";
    track.appendChild(clone);

    const distance = contentHeight;
    const pxPerSec = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--px-per-sec")) || 40;
    const durationSec = Math.max(20, distance / pxPerSec);

    track.style.setProperty("--scroll-distance", `${distance}px`);
    track.style.setProperty("--scroll-duration", `${durationSec}s`);

    panel.classList.add("is-scrolling");
  }

  // ====== LOAD ALL ======
  async function loadAll(){
    const content = $("content");
    clearAndStopScrolling();
    content.innerHTML = "";

    try{
      const results = await Promise.all(SOURCES.map(async (src) => {
        const raw = await fetchCsvRows(src.url);
        const cleaned = raw
          .map(sliceBG)
          .map(r => r.map(c => c.replace(/\s+/g, " ").trim()));
        const rowsBG = cleaned
          .slice(IGNORE_TOP_ROWS)
          .filter(r => !isRowEmpty(r));
        return { name: src.name, rowsBG };
      }));

      results.forEach(({name, rowsBG}) => {
        content.appendChild(buildSection(name, rowsBG));
      });

      $("updated").textContent = `Updated: ${nowStamp()}`;

      requestAnimationFrame(() => {
        highlightNowPerforming();
        startContinuousScroll();
        setTimeout(() => {
          highlightNowPerforming();
          startContinuousScroll();
        }, 750);
      });

    } catch(e){
      content.innerHTML = `<div class="error">Could not load schedule data. Confirm each tab is published as CSV and accessible.</div>`;
      $("updated").textContent = `Updated: ${nowStamp()} (load error)`;
    }
  }

  // ====== INIT ======
  loadAll();
  setInterval(loadAll, DATA_REFRESH_MS);
  setInterval(highlightNowPerforming, 30000);
  window.addEventListener("resize", () => {
    setTimeout(() => {
      highlightNowPerforming();
      startContinuousScroll();
    }, 200);
  });
</script>
</body>
</html>
